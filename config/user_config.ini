[Settings]
# Personal overrides. The app loads config/config.ini first, then this file.

# Use your own channel menu and write to separate personal result files.
source_file = config/user_demo.txt
final_file = output/my_iptv.txt

# Keep the output player-friendly.
open_url_info = False
open_update_time = True
update_time_position = top
open_m3u_result = True

# Prefer GitHub subscriptions; local entries still work as fallback.
open_local = True
open_subscribe = True
open_history = True
origin_type_prefer = subscribe,local
local_num = 3
subscribe_num = 5
urls_limit = 5

# Faster and steadier refresh for daily personal use.
open_speed_test = True
open_filter_resolution = True
open_filter_speed = True
open_full_speed_test = False
open_supply = True
min_resolution = 1280x720
max_resolution = 3840x2160
min_speed = 0.35
resolution_speed_map = 1280x720:0.2,1920x1080:0.45,3840x2160:1.0
speed_test_limit = 8
speed_test_timeout = 8
speed_test_filter_host = True
request_timeout = 8

# Public default output should work on more networks: IPv4 first, IPv6 fallback.
ipv6_support = False
ipv_type = all
ipv_type_prefer = ipv4,ipv6

# Leave blank unless you want strict filtering, for example: 广东,广州
location =
isp =

# Personal service defaults.
open_service = True
app_port = 5180
public_scheme = http
public_domain = 127.0.0.1

# RTMP/HLS relay costs extra CPU and needs FFmpeg. Keep it off unless you need relay playback.
open_rtmp = False
rtmp_idle_timeout = 300
rtmp_max_streams = 3
rtmp_transcode_mode = copy
